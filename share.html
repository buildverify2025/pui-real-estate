  <style>
    :root {
      --gold: #B8860B;
      --gold-light: #D4A843;
      --dark: #1a1a2e;
      --green: #25D366;
      --line-green: #00B900;
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #333;
      --text-light: #666;
      --text-muted: #999;
      --radius: 12px;
      --border: #eee;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Sarabun', 'Inter', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      line-height: 1.6; 
      max-width: 480px; 
      margin: 0 auto;
      padding-bottom: 90px;
    }

    /* HEADER */
    .header {
      background: var(--dark);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header .logo {
      color: var(--gold);
      font-weight: 700;
      font-size: 1rem;
    }
    .header .logo span { color: #fff; font-weight: 300; }
    .header-back {
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    /* PHOTO GALLERY */
    .photo-grid {
      display: grid;
      gap: 2px;
      background: #000;
    }
    .photo-grid.layout-1 { grid-template-columns: 1fr; }
    .photo-grid.layout-2 { grid-template-columns: 1fr 1fr; }
    .photo-grid.layout-3 { grid-template-columns: 1fr 1fr; }
    .photo-grid.layout-3 .photo-item:first-child { grid-column: 1 / -1; }
    .photo-grid.layout-4 { grid-template-columns: 1fr 1fr; }
    .photo-grid.layout-many { grid-template-columns: 1fr 1fr; }
    .photo-grid.layout-many .photo-item:first-child { grid-column: 1 / -1; }

    .photo-item {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      cursor: pointer;
    }
    .photo-grid.layout-many .photo-item:first-child,
    .photo-grid.layout-3 .photo-item:first-child { aspect-ratio: 16/9; }
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-more {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .photo-count {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      z-index: 2;
    }

    /* FULLSCREEN VIEWER */
    .viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 1000;
      flex-direction: column;
    }
    .viewer.open { display: flex; }
    .viewer-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      color: #fff;
    }
    .viewer-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      padding: 4px;
    }
    .viewer-counter { font-size: 0.9rem; opacity: 0.6; }
    .viewer-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .viewer-main img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .viewer-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
    }
    .viewer-prev { left: 8px; }
    .viewer-next { right: 8px; }
    .viewer-hint {
      text-align: center;
      padding: 10px;
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
    }

    /* CARD */
    .card {
      background: var(--card);
      margin: 8px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    .card-body { padding: 16px; }

    /* BADGE */
    .badge {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    /* TITLE - Bilingual */
    .prop-title-th {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.3;
    }
    .prop-title-en {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-light);
      margin-bottom: 4px;
    }
    .prop-location {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* DETAILS - Bilingual rows */
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      min-width: 90px;
      flex-shrink: 0;
    }
    .detail-label .emoji { margin-right: 4px; }
    .detail-value {
      text-align: right;
      font-weight: 600;
      color: var(--dark);
      font-size: 0.95rem;
    }
    .detail-value .sub {
      display: block;
      font-weight: 400;
      font-size: 0.8rem;
      color: var(--text-light);
    }

    /* DESCRIPTION */
    .desc-section { margin-top: 14px; }
    .desc-th {
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 6px;
    }
    .desc-en {
      color: var(--text-light);
      font-size: 0.88rem;
      line-height: 1.7;
      font-style: italic;
    }

    /* HIGHLIGHTS + SUITABLE */
    .section-head {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--dark);
      margin: 14px 0 8px;
      display: flex;
      gap: 6px;
    }
    .section-head .en { color: var(--text-light); font-weight: 400; }
    .check-list { list-style: none; padding: 0; }
    .check-list li {
      padding: 3px 0;
      font-size: 0.9rem;
      color: var(--text);
    }
    .check-list .en-line {
      color: var(--text-light);
      font-size: 0.82rem;
      padding-left: 22px;
      margin-bottom: 4px;
    }

    /* MAP */
    .map-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      margin-top: 14px;
    }
    .map-row:active { background: #e0e0e0; }
    .map-icon { font-size: 1.5rem; }
    .map-text .main { font-weight: 500; font-size: 0.9rem; }
    .map-text .sub { font-size: 0.78rem; color: var(--text-muted); }

    /* SHARE TEXT PREVIEW */
    .preview-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 14px 8px 4px;
      font-weight: 600;
    }
    .preview-box {
      background: #e8e8e8;
      border-radius: var(--radius);
      padding: 14px;
      margin: 0 8px;
      font-size: 0.85rem;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      padding: 10px 12px;
      display: flex;
      gap: 6px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
      z-index: 100;
    }
    .bar-btn {
      flex: 1;
      padding: 13px 6px;
      border: none;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .bar-btn:active { opacity: 0.75; }
    .btn-copy { background: var(--dark); color: #fff; }
    .btn-share { background: var(--gold); color: #fff; }
    .btn-line { background: var(--line-green); color: #fff; }
    .btn-wa { background: var(--green); color: #fff; }

    /* TOAST */
    .toast {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--dark);
      color: #fff;
      padding: 8px 18px;
      border-radius: 18px;
      font-size: 0.82rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* NO PHOTOS PLACEHOLDER */
    .no-photos {
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--gold);
      font-size: 1.2rem;
    }

    /* INDEX PAGE */
    .index-list { padding: 12px; }
    .index-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin-bottom: 8px;
      background: var(--card);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .index-item:active { background: #f0f0f0; }
    .index-thumb {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--dark);
    }
    .index-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .index-thumb-empty {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.4rem;
    }
    .index-title { font-weight: 600; font-size: 0.9rem; line-height: 1.3; }
    .index-loc { font-size: 0.78rem; color: var(--text-muted); }
  </style>
</head>

    // =========================================
    // STATE
    // =========================================
    let vPhotos = [], vIdx = 0;

    // =========================================
    // HELPERS
    // =========================================
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    // =========================================
    // VIEWER
    // =========================================
    function openViewer(photos, idx) {
      vPhotos = photos; vIdx = idx || 0;
      updateViewer();
      document.getElementById('viewer').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeViewer() {
      document.getElementById('viewer').classList.remove('open');
      document.body.style.overflow = '';
    }
    function vNav(d) {
      vIdx = (vIdx + d + vPhotos.length) % vPhotos.length;
      updateViewer();
    }
    function updateViewer() {
      document.getElementById('vImg').src = vPhotos[vIdx];
      document.getElementById('vCount').textContent = `${vIdx+1} / ${vPhotos.length}`;
    }
    // Swipe
    (function(){
      let sx=0;
      const el = document.getElementById('vMain');
      el.addEventListener('touchstart', e => { sx = e.touches[0].clientX; });
      el.addEventListener('touchend', e => {
        const d = sx - e.changedTouches[0].clientX;
        if (Math.abs(d) > 50) vNav(d > 0 ? 1 : -1);
      });
    })();

    // =========================================
    // GENERATE BILINGUAL SHARE TEXT
    // =========================================
    function makeShareText(p) {
      let L = [];
      L.push(`🔥 ${p.title.th}`);
      L.push(`   ${p.title.en}`);
      L.push('');
      L.push(`📍 ${p.location.th}`);
      L.push(`   ${p.location.en}`);
      L.push('');

      p.details.forEach(d => {
        L.push(`${d.emoji} ${d.label.th} / ${d.label.en}: ${d.value.th}`);
        if (d.value.th !== d.value.en) L.push(`   ${d.value.en}`);
      });
      L.push('');

      if (p.suitable && p.suitable.length) {
        L.push('🌿 เหมาะสำหรับ / Suitable for:');
        p.suitable.forEach(s => L.push(`• ${s.th} / ${s.en}`));
        L.push('');
      }

      if (p.highlights && p.highlights.length) {
        L.push('📌 จุดเด่น / Highlights:');
        p.highlights.forEach(h => L.push(`✅ ${h.th}`));
        L.push('---');
        p.highlights.forEach(h => L.push(`✅ ${h.en}`));
        L.push('');
      }

      if (p.mapUrl) {
        L.push(`🗺️ แผนที่ / Map:`);
        L.push(p.mapUrl);
        L.push('');
      } else if (p.gps) {
        L.push(`🗺️ แผนที่ / Map:`);
        L.push(`https://www.google.com/maps?q=${p.gps.lat},${p.gps.lng}`);
        L.push('');
      }

      L.push(`📞 ติดต่อ / Contact: ${p.contact}`);
      L.push(`🌐 ThaiPropertyList.com`);

      return L.join('\n');
    }

    // =========================================
    // ACTIONS
    // =========================================
    function copyShareText(id) {
      const p = properties[id];
      const text = makeShareText(p);
      navigator.clipboard.writeText(text).then(() => {
        toast('📋 คัดลอกแล้ว! / Copied!');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        toast('📋 คัดลอกแล้ว! / Copied!');
      });
    }

    function shareNative(id) {
      const p = properties[id];
      const text = makeShareText(p);
      if (navigator.share) {
        navigator.share({ title: `${p.title.th} / ${p.title.en}`, text, url: window.location.href }).catch(()=>{});
      } else {
        copyShareText(id);
      }
    }

    function lineShare(id) {
      const p = properties[id];
      const text = makeShareText(p);
      window.open(`https://line.me/R/share?text=${encodeURIComponent(text)}`, '_blank');
    }

    function waShare(id) {
      const p = properties[id];
      const text = makeShareText(p);
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    // =========================================
    // RENDER
    // =========================================
    function render() {
      const params = new URLSearchParams(window.location.search);
      const id = (params.get('id') || '').toUpperCase();
      const p = properties[id];
      const app = document.getElementById('app');

      if (!p) {
        // Index
        app.innerHTML = `
          <div class="index-list">
            <div style="padding:8px 0 12px;font-weight:600;font-size:1rem;">เลือกรายการเพื่อแชร์ / Select listing to share</div>
            ${Object.values(properties).map(pr => `
              <a href="?id=${pr.id}" class="index-item">
                <div class="index-thumb">
                  ${pr.photos.length ? `<img src="${pr.photos[0]}" loading="lazy">` : `<div class="index-thumb-empty">🏠</div>`}
                </div>
                <div>
                  <div class="index-title">${pr.title.th}</div>
                  <div class="index-loc">📍 ${pr.location.th} / ${pr.location.en}</div>
                </div>
              </a>
            `).join('')}
          </div>
        `;
        return;
      }

      // OG tags
      document.getElementById('og-title').content = `${p.title.th} / ${p.title.en}`;
      document.getElementById('og-desc').content = p.desc.th;
      if (p.photos.length) {
        const base = window.location.origin + window.location.pathname.replace('share.html','');
        document.getElementById('og-image').content = base + p.photos[0];
      }
      document.getElementById('og-url').content = window.location.href;
      document.title = `${p.title.th} — Thai Property List`;

      // Photo grid
      const photos = p.photos;
      const maxShow = 5;
      const show = photos.slice(0, maxShow);
      const layout = photos.length === 0 ? '' : photos.length <= 2 ? `layout-${photos.length}` : photos.length <= 4 ? `layout-${photos.length}` : 'layout-many';

      const photoHTML = photos.length === 0
        ? `<div class="no-photos">📷 รูปเร็วๆนี้ / Photos coming soon</div>`
        : `<div class="photo-grid ${layout}">
            ${show.map((ph, i) => `
              <div class="photo-item" onclick="openViewer(${JSON.stringify(photos)}, ${i})">
                <img src="${ph}" alt="" loading="lazy">
                ${i === 0 ? `<span class="photo-count">📷 ${photos.length}</span>` : ''}
                ${i === maxShow-1 && photos.length > maxShow ? `<div class="photo-more">+${photos.length - maxShow}</div>` : ''}
              </div>
            `).join('')}
          </div>`;

      // Details rows
      const detailsHTML = p.details.map(d => `
        <div class="detail-row">
          <div class="detail-label">
            <span class="emoji">${d.emoji}</span>
            ${d.label.th}<br>${d.label.en}
          </div>
          <div class="detail-value">
            ${d.value.th}
            ${d.value.th !== d.value.en ? `<span class="sub">${d.value.en}</span>` : ''}
          </div>
        </div>
      `).join('');

      // Suitable
      const suitableHTML = p.suitable && p.suitable.length ? `
        <div class="section-head">🌿 เหมาะสำหรับ <span class="en">/ Suitable for</span></div>
        <ul class="check-list">
          ${p.suitable.map(s => `<li>• ${s.th} <span style="color:var(--text-muted);font-size:0.82rem;">/ ${s.en}</span></li>`).join('')}
        </ul>
      ` : '';

      // Highlights
      const hlHTML = p.highlights && p.highlights.length ? `
        <div class="section-head">📌 จุดเด่น <span class="en">/ Highlights</span></div>
        <ul class="check-list">
          ${p.highlights.map(h => `
            <li>✅ ${h.th}</li>
            <li class="en-line">${h.en}</li>
          `).join('')}
        </ul>
      ` : '';

      // Map
      let mapHTML = '';
      const mapLink = p.mapUrl || (p.gps ? `https://www.google.com/maps?q=${p.gps.lat},${p.gps.lng}` : null);
      if (mapLink) {
        mapHTML = `
          <a href="${mapLink}" target="_blank" class="map-row">
            <span class="map-icon">🗺️</span>
            <div class="map-text">
              <div class="main">${p.location.th} / ${p.location.en}</div>
              <div class="sub">เปิดแผนที่ / Open in Google Maps →</div>
            </div>
          </a>
        `;
      }

      // Share text preview
      const shareText = makeShareText(p);

      app.innerHTML = `
        ${photoHTML}

        <div class="card">
          <div class="card-body">
            <span class="badge">${p.badge.th} / ${p.badge.en}</span>
            <div class="prop-title-th">${p.title.th}</div>
            <div class="prop-title-en">${p.title.en}</div>
            <div class="prop-location">${p.location.th} / ${p.location.en}</div>
            
            ${detailsHTML}
            
            <div class="desc-section">
              <p class="desc-th">${p.desc.th}</p>
              <p class="desc-en">${p.desc.en}</p>
            </div>

            ${suitableHTML}
            ${hlHTML}
            ${mapHTML}
          </div>
        </div>

        <div class="preview-label">📋 ข้อความสำหรับแชร์ / Share text</div>
        <div class="preview-box">${shareText}</div>

        <div class="bottom-bar">
          <button class="bar-btn btn-copy" onclick="copyShareText('${p.id}')">📋 คัดลอก</button>
          <button class="bar-btn btn-share" onclick="shareNative('${p.id}')">📤 Share</button>
          <button class="bar-btn btn-line" onclick="lineShare('${p.id}')">💚 LINE</button>
          <button class="bar-btn btn-wa" onclick="waShare('${p.id}')">💬 WA</button>
        </div>
      `;
    }

    // INIT
    render();
  </script>
</body>
</html>
